# About Section
# about_title: About Me
# about_profile_image: images/profile.jpg
about_content: | 
  <mark>모바일 프론트엔드 개발자</mark>로서 Flutter · SwiftUI 기반에서 상태 흐름과 화면 전이 타이밍을 구조적으로 설계해왔습니다.<br/>
  Riverpod(StateNotifierProvider)과 GetX(Rx)를 활용해 기능 단위로 상태를 모델링하고, 로딩·에러·데이터 상태를 명확히 분리해 비동기 요청이 겹쳐도 UI가 흔들리지 않도록 구현했습니다.<br/>
  OAuth 인증 전환, 순차 API 호출, 상세 화면 재진입 등 비동기 흐름에서 발생할 수 있는 상태 불일치를 호출 순서 고정과 전역 상태 기반 제어로 해결했습니다.<br/>
  REST API 응답 스키마를 기준으로 상태 구조를 먼저 정의한 뒤 UI를 연결하는 방식을 지향하며, 재진입·로딩·빈 상태까지 고려해 화면 생명주기 전반의 안정성을 확보합니다.<br/>
  sqflite 기반 로컬 저장과 캐시 전략을 적용해 데이터와 UI의 일관성을 유지하고, 기능 구현을 넘어 구조적 책임 분리를 중심으로 설계합니다.<br/>


