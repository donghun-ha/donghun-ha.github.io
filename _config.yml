# About Section
# about_title: About Me
about_profile_image: images/profile.jpg
about_content: | 
  <mark>모바일 프론트엔드 개발자</mark>로, Flutter · SwiftUI 기반에서 상태 흐름을 설계하고 화면 전이를 구조적으로 구현해왔습니다.<br/>
  Riverpod(StateNotifierProvider)과 GetX(Rx)를 활용해 <strong>기능 단위 상태 모델링</strong>을 수행하고, 로딩·에러·데이터 상태를 명확히 분리해 예측 가능한 UI 동작을 구현했습니다.<br/>
  <mark>비동기 API 호출 순서 제어</mark>를 통해 OAuth 인증–자동 로그인–로그아웃 전환 과정의 데이터 동기화 오류를 개선했으며, 전역 상태(AppState) 기반으로 화면 간 상태 불일치와 중복 갱신을 최소화했습니다.<br/>
  REST API 응답 스키마를 기준으로 상태 구조를 먼저 정의한 뒤 UI를 연결하는 방식을 지향하며, 재진입·로딩·빈 상태까지 고려해 화면 생명주기 전반에서 UX 안정성을 확보했습니다.<br/>
  sqflite 기반 로컬 저장과 캐시 전략을 적용해 <strong>UI와 데이터 일관성</strong>을 유지하고, 기능 구현을 넘어 구조적 일관성과 유지보수 가능성을 중심으로 설계하는 개발자를 지향합니다.<br/>


